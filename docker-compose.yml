services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: lavajato
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lavajato
      API_PORT: 4000
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/server/storage/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: /api
        APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
    restart: unless-stopped
    environment:
      APP_HOST: ${APP_HOST:-localhost}
      APP_CERT_NAME: ${APP_CERT_NAME:-localhost}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.runtime/letsencrypt/conf:/etc/letsencrypt:ro
      - ./.runtime/letsencrypt/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    profiles:
      - ops
    volumes:
      - ./.runtime/letsencrypt/conf:/etc/letsencrypt
      - ./.runtime/letsencrypt/www:/var/www/certbot

volumes:
  postgres_data:
  uploads_data:
