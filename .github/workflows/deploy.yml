name: Deploy to AWS
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_ROLE_ARN_VALUE: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID_VALUE: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY_VALUE: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run lint
      - name: Check persistence docs freshness
        run: pnpm run docs:check
      - name: Generate deployed persistence docs
        run: |
          cp HANDOFF.md HANDOFF_AWS.md
          cp AGENTS.md AGENTS_AWS.md
          cp SKILLS.md SKILLS_AWS.md
          node scripts/update-handoff.mjs --deployed-sha "${GITHUB_SHA}" --output HANDOFF_AWS.md
          node scripts/update-doc-metadata.mjs --deployed-sha "${GITHUB_SHA}" --file AGENTS_AWS.md
          node scripts/update-doc-metadata.mjs --deployed-sha "${GITHUB_SHA}" --file SKILLS_AWS.md
      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ env.AWS_ROLE_ARN_VALUE }}
      - name: Configure AWS credentials (Static Keys)
        if: ${{ env.AWS_ROLE_ARN_VALUE == '' && env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_VALUE }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_VALUE }}
      - name: Send SSM deploy command
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          SSM_PARAMETERS=$(node scripts/build-ssm-deploy-command.mjs)
          CMD_ID=$(aws ssm send-command \
            --region us-east-2 \
            --instance-ids i-0ba1477cbbe3d986d \
            --document-name AWS-RunShellScript \
            --comment "Deploy LavaJato ${GITHUB_SHA}" \
            --parameters "${SSM_PARAMETERS}" \
            --query "Command.CommandId" \
            --output text)
          echo "CMD_ID=${CMD_ID}" >> $GITHUB_ENV
          echo "SSM_COMMAND_ID=${CMD_ID}"
      - name: Check SSM command result
        run: |
          for i in {1..20}; do
            STATUS=$(aws ssm list-command-invocations \
              --region us-east-2 \
              --command-id "${CMD_ID}" \
              --details \
              --query 'CommandInvocations[0].Status' \
              --output text || echo "Unknown")
            echo "SSM status: ${STATUS}"
            if [ "${STATUS}" = "Success" ] || [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ]; then
              break
            fi
            sleep 10
          done
          if [ "${STATUS}" != "Success" ]; then
            echo "SSM command did not succeed: ${STATUS}"
            exit 1
          fi
          aws ssm list-command-invocations \
            --region us-east-2 \
            --command-id "${CMD_ID}" \
            --details \
            --query 'CommandInvocations[].{Status:Status,Output:CommandPlugins[0].Output}' \
            --output json
      - name: Post-deploy health check
        run: |
          set -e
          curl -sS -I http://3.145.153.19/ | head -n 1
          curl -sS http://3.145.153.19/api/health
